name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: YSHSteamNetApp-win-x64.zip
          - os: ubuntu-latest
            rid: linux-x64
            archive: YSHSteamNetApp-linux-x64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: >
          dotnet publish YSHSteamNetApp
          --runtime ${{ matrix.rid }}
          --configuration Release
          --no-self-contained
          --output ./publish

      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ${{ matrix.archive }}

      - name: Archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf ${{ matrix.archive }} -C ./publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
