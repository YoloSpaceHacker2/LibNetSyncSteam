name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore SteamNetSolution.slnx

      - name: Build
        run: dotnet build SteamNetSolution.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test YSHSteamNetTestApp --configuration Release --no-build --logger "console;verbosity=normal"
